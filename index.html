
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Главная</title>
<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#0b0b0b;
font-family:Arial,sans-serif;
}
button{
padding:18px 56px;
font-size:22px;
font-weight:bold;
color:#fff;
background:linear-gradient(135deg,#00c853,#00e676);
border:none;
border-radius:18px;
cursor:pointer;
transition:.3s;
box-shadow:0 0 25px rgba(0,255,140,.45);
position:relative;
overflow:hidden;
}
button:hover{transform:scale(1.05)}
button:before{
content:"";
position:absolute;
top:0;left:-120%;
width:60%;height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);
transform:skewX(-20deg);
animation:s 2.5s infinite;
}
@keyframes s{to{left:160%}}
</style>
</head>
<body>
<button onclick="location.href='services.html'">Начать</button>
</body>
</html>
