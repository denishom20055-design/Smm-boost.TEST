<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SMMBOOST Demo</title>
<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:#fff}
header{display:flex;justify-content:space-between;padding:18px 5%;background:#101010}
.logo{color:#39ff88;font-size:28px;font-weight:bold}
nav a{color:#fff;margin:0 10px;text-decoration:none}
.hero{padding:80px 5%;text-align:center;background:linear-gradient(#10351e,#0b0b0b)}
.btn{background:#39ff88;color:#000;padding:12px 22px;border:none;border-radius:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;padding:40px}
.card{background:#151515;border:1px solid #2a2a2a;border-radius:16px;padding:20px}
</style></head><body>
<header><div class="logo">SMMBOOST</div><nav><a href="#">Главная</a><a href="#">Услуги</a><a href="#">FAQ</a></nav></header>
<section class="hero"><h1>Продвигайте социальные сети</h1><button class="btn" onclick="alert('Демо')">Начать</button></section>
<div class="grid">
<div class="card"><h3>Instagram</h3><button class="btn">Заказать</button></div>
<div class="card"><h3>TikTok</h3><button class="btn">Заказать</button></div>
<div class="card"><h3>YouTube</h3><button class="btn">Заказать</button></div>
<div class="card"><h3>Telegram</h3><button class="btn">Заказать</button></div>
</div>
</body></html>
