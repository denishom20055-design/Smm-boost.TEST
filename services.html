
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Заказ услуг</title>
<style>
body{margin:0;background:#101010;color:white;font-family:Arial}
header{padding:24px;text-align:center;background:#161616;border-bottom:1px solid #2c2c2c}
h1{margin:0;color:#00e676}
.container{max-width:1000px;margin:40px auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.card{background:#1b1b1b;padding:20px;border-radius:16px;border:1px solid #2f2f2f}
.price{font-size:26px;color:#00e676;font-weight:bold}
button{
margin-top:16px;width:100%;padding:12px;border:none;border-radius:12px;
background:#00c853;color:#fff;font-weight:bold;cursor:pointer}
</style>
</head>
<body>
<header>
<h1>Заказ услуг</h1>
<p>Тестовый набросок страницы</p>
</header>

<div class="container">
<div class="grid">
<div class="card">
<h2>Instagram подписчики</h2>
<div class="price">от 150 ₽</div>
<p>Быстрый запуск заказа.</p>
<button>Заказать</button>
</div>

<div class="card">
<h2>TikTok просмотры</h2>
<div class="price">от 50 ₽</div>
<p>Тестовая карточка услуги.</p>
<button>Заказать</button>
</div>

<div class="card">
<h2>YouTube просмотры</h2>
<div class="price">от 99 ₽</div>
<p>Будет добавлено позже.</p>
<button>Заказать</button>
</div>
</div>
</div>

</body>
</html>
